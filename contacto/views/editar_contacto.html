$def with (contacto)
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div>
        <h1>Editar Contacto</h1>
        
        <form method="POST" action="/editar_contacto/$contacto.id_contacto">
            
            <div>
                <label>ID</label>
                <input type="text" name="id_contacto" class="form-control" value="8" readonly>
            </div>
            
            <div>
                <label>Nombre</label>
                <input type="text" name="nombre" class="form-control" value="Dejah" required>
            </div>
            
            <div>
                <label>Primer Apellido</label>
                <input type="text" name="primer_apellido" class="form-control" value="Thoris" required>
            </div>
            
            <div>
                <label>Segundo Apellido</label>
                <input type="text" name="segundo_apellido" class="form-control" value="Mars">
            </div>

            <div>
                <label>Teléfono</label>
                <input type="text" name="telefono" class="form-control" value="111111">
            </div>

            <div>
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="dejah@email.com">
            </div>
            
            <div>
                <button>Guardar cambios</button>
                <button><a href="/lista_contactos">Cancelar</a></button>
            </div>
            
        </form>
    </div>

</body>
</html>
