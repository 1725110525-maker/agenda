<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Insertar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-4" style="max-width: 500px;">
      <h1 class="mb-4">Insertar Nuevo Contacto</h1>
      
      <form method="POST">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre:</label>
          <input type="text" id="nombre" name="nombre" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="primer_apellido" class="form-label">Primer Apellido:</label>
          <input type="text" id="primer_apellido" name="primer_apellido" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="segundo_apellido" class="form-label">Segundo Apellido:</label>
          <input type="text" id="segundo_apellido" name="segundo_apellido" class="form-control">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email:</label>
          <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="telefono" class="form-label">Teléfono:</label>
          <input type="tel" id="telefono" name="telefono" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar Contacto</button>
        <a href="/lista_contactos" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>
  </body>
</html>
