<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Borrar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-5 text-center" style="max-width: 400px;">
      <h1 class="text-danger h3 mb-3">Borrar un Contacto</h1>
      <p class="mb-4">¿Estás completamente seguro de que deseas eliminar este contacto de tu agenda?</p>
      
      <form method="POST">
        <div class="gap-2">
          <button type="submit" class="btn btn-danger">Sí, borrar</button>
          <a href="/lista_contactos" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
      
      <div class="mt-4">
        <a href="/" class="text-secondary small">Salir al Inicio</a>
      </div>
    </div>
  </body>
</html>
